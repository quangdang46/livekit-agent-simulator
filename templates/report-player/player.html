<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>lk-sim player</title>
  <link rel="stylesheet" href="/player.css" />
</head>
<body>
  <main class="page player-page">
    <header class="header">
      <a class="back" href="/">← runs</a>
      <h1 id="title">Report player</h1>
      <p id="subtitle" class="muted"></p>
    </header>

    <section class="audio-panel">
      <audio id="audio" controls preload="metadata"></audio>
      <p id="audio-missing" class="warn hidden">No <code>conversation.wav</code> for this run. Transcript still lists with timestamps.</p>
      <p class="hint muted">L = sim caller · R = agent (stereo). Click a line to seek.</p>
    </section>

    <section class="transcript-panel">
      <h2>Transcript</h2>
      <ol id="cues" class="cues"></ol>
    </section>
  </main>
  <script src="/player.js"></script>
</body>
</html>

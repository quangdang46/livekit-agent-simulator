name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Build, test, publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --frozen --extra dev

      - name: Run tests
        run: uv run pytest -q

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -z "$UV_PUBLISH_TOKEN" ]; then
            echo "PYPI_API_TOKEN not configured — skipping PyPI publish (GitHub Release only)."
            exit 0
          fi
          uv publish

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

      - name: Release summary
        run: |
          {
            echo "## Release"
            echo ""
            echo "Tag: \`${GITHUB_REF_NAME}\`"
            echo ""
            echo "### Artifacts"
            ls -la dist/
          } >> "$GITHUB_STEP_SUMMARY"

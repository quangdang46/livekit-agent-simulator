name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Test + GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Build report player (must be present for git installs)
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          pnpm run build
          test -f ../templates/report-player/index.html
          test -d ../templates/report-player/assets
          ls -la ../templates/report-player/assets/

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --frozen --extra dev

      - name: Run tests
        run: uv run pytest -q

      - name: CLI smoke
        run: uv run lk-sim --help

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            install.sh
            install.ps1
          body: |
            ## Install

            Distribution is **git + uv/pipx only** (no PyPI / wheel publish).

            ### macOS / Linux

            ```bash
            # pin to this release tag
            curl -fsSL "https://raw.githubusercontent.com/quangdang46/livekit-agent-simulator/main/install.sh?$(date +%s)" | bash -s -- --ref ${{ github.ref_name }} --verify

            # or latest main
            curl -fsSL "https://raw.githubusercontent.com/quangdang46/livekit-agent-simulator/main/install.sh?$(date +%s)" | bash
            ```

            ### Windows PowerShell

            ```powershell
            irm "https://raw.githubusercontent.com/quangdang46/livekit-agent-simulator/main/install.ps1" -OutFile install.ps1
            .\install.ps1 -GitRef ${{ github.ref_name }} -Verify
            ```

            ### Direct (no installer)

            ```bash
            uv tool install --force "git+https://github.com/quangdang46/livekit-agent-simulator.git@${{ github.ref_name }}"
            ```

            Report player is prebuilt under `templates/report-player/` in the tagged tree — no Node on the user machine.

      - name: Release summary
        if: always()
        run: |
          {
            echo "## Release"
            echo ""
            echo "Tag: \`${GITHUB_REF_NAME}\`"
            echo ""
            echo "### Pipeline"
            echo "- pnpm web build → templates/report-player/"
            echo "- pytest + lk-sim --help"
            echo "- GitHub Release with install.sh + install.ps1"
            echo "- **No** wheel / sdist / PyPI publish"
            echo ""
            echo "### Install (full URLs)"
            echo "\`\`\`bash"
            echo "curl -fsSL \"https://raw.githubusercontent.com/quangdang46/livekit-agent-simulator/main/install.sh?\$(date +%s)\" | bash -s -- --ref ${GITHUB_REF_NAME} --verify"
            echo "\`\`\`"
            echo ""
            echo "\`\`\`powershell"
            echo "irm \"https://raw.githubusercontent.com/quangdang46/livekit-agent-simulator/main/install.ps1\" -OutFile install.ps1"
            echo ".\\install.ps1 -GitRef ${GITHUB_REF_NAME} -Verify"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
